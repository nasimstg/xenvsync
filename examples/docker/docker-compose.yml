# Example docker-compose.yml using xenvsync for secret injection.
#
# Usage:
#   1. Ensure .xenvsync.key exists in the project root
#   2. docker compose up
#
# The .env.vault and .xenvsync.key are mounted into the container at runtime.
# The key file is mounted read-only and never baked into the image.

services:
  app:
    build: .
    volumes:
      - ../../.env.vault:/app/.env.vault:ro
      - ../../.xenvsync.key:/app/.xenvsync.key:ro
    entrypoint: ["xenvsync", "run", "--"]
    command: ["node", "server.js"]

  # Alternative: use the xenvsync image as an init container
  # to write a decrypted .env file for services that can't use entrypoint injection.
  decrypt:
    image: ghcr.io/nasimstg/xenvsync:latest
    volumes:
      - ../../.env.vault:/app/.env.vault:ro
      - ../../.xenvsync.key:/app/.xenvsync.key:ro
      - secrets:/app/output
    command: ["pull", "--vault", "/app/.env.vault", "--out", "/app/output/.env"]

  legacy-app:
    image: your-legacy-app:latest
    depends_on:
      decrypt:
        condition: service_completed_successfully
    volumes:
      - secrets:/app:ro

volumes:
  secrets:
