# Example docker-compose.yml using xenvsync for secret injection.
#
# Usage:
#   1. Set XENVSYNC_KEY in your shell or .env file (NOT .env.vault)
#   2. docker compose up
#
# The .env.vault is mounted into the container and decrypted at runtime.

services:
  app:
    build: .
    volumes:
      - ../../.env.vault:/app/.env.vault:ro
    environment:
      - XENVSYNC_KEY=${XENVSYNC_KEY}
    entrypoint: ["xenvsync", "run", "--"]
    command: ["node", "server.js"]

  # Alternative: use the xenvsync image as an init container
  # to write a decrypted .env file for services that can't use entrypoint injection.
  decrypt:
    image: ghcr.io/nasimstg/xenvsync:latest
    volumes:
      - ../../.env.vault:/app/.env.vault:ro
      - secrets:/app/output
    environment:
      - XENVSYNC_KEY=${XENVSYNC_KEY}
    command: ["pull", "--vault", "/app/.env.vault", "--out", "/app/output/.env"]

  legacy-app:
    image: your-legacy-app:latest
    depends_on:
      decrypt:
        condition: service_completed_successfully
    volumes:
      - secrets:/app:ro

volumes:
  secrets:
