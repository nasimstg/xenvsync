# Bitbucket Pipelines example for xenvsync.
#
# Setup:
#   1. In Bitbucket → Repository settings → Repository variables, add XENVSYNC_KEY (secured).
#   2. Commit your .env.vault to the repository.

image: node:20

definitions:
  steps:
    - step: &install-xenvsync
        name: Install xenvsync
        script:
          - LATEST=$(curl -s https://api.github.com/repos/nasimstg/xenvsync/releases/latest | grep -o '"tag_name":"[^"]*' | cut -d'"' -f4)
          - VERSION=${LATEST#v}
          - curl -fsSL "https://github.com/nasimstg/xenvsync/releases/download/${LATEST}/xenvsync_${VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin

pipelines:
  default:
    - step:
        name: Build
        script:
          # Install xenvsync
          - LATEST=$(curl -s https://api.github.com/repos/nasimstg/xenvsync/releases/latest | grep -o '"tag_name":"[^"]*' | cut -d'"' -f4)
          - VERSION=${LATEST#v}
          - curl -fsSL "https://github.com/nasimstg/xenvsync/releases/download/${LATEST}/xenvsync_${VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
          # Decrypt secrets
          - echo "$XENVSYNC_KEY" > .xenvsync.key
          - chmod 600 .xenvsync.key
          - xenvsync pull
          - rm .xenvsync.key
          # Build
          - npm ci
          - npm run build

  branches:
    main:
      - step:
          name: Deploy production
          deployment: production
          script:
            - LATEST=$(curl -s https://api.github.com/repos/nasimstg/xenvsync/releases/latest | grep -o '"tag_name":"[^"]*' | cut -d'"' -f4)
            - VERSION=${LATEST#v}
            - curl -fsSL "https://github.com/nasimstg/xenvsync/releases/download/${LATEST}/xenvsync_${VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
            - echo "$XENVSYNC_KEY" > .xenvsync.key
            - chmod 600 .xenvsync.key
            - xenvsync pull --env production
            - rm .xenvsync.key
            - echo "Deploying with production secrets..."
